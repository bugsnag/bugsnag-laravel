version: '3.8'

services:
  laravel51:
    build:
      context: laravel51
      args:
        - PHP_VERSION
    environment:
      - BUGSNAG_API_KEY
      - BUGSNAG_ENDPOINT
      - BUGSNAG_SESSION_ENDPOINT
      - BUGSNAG_CAPTURE_SESSIONS
      - BUGSNAG_USE_CUSTOM_GUZZLE
      - BUGSNAG_REGISTER_OOM_BOOTSTRAPPER
      - BUGSNAG_DISCARD_CLASSES
      - BUGSNAG_REDACTED_KEYS
      - BUGSNAG_QUERY
    restart: "no"
    ports:
      - target: 8000
        published: 61251

